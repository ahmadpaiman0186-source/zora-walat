# Deterministic money-path stress (mock provider). Schedules nightly + manual dispatch.
name: Nightly fortress (mock)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

concurrency:
  group: nightly-fortress-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fortress-mock:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zw_phase1_fortress_nightly
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zw_phase1_fortress_nightly
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zw_phase1_fortress_nightly
      NODE_ENV: test
      # Harden mock-only fortress semantics — queue off unless REDIS added later.
      FORTRESS_PROBE_AIRTIME_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Migrate DB
        run: npm run db:migrate
      - name: Integration — transaction fortress concurrency
        id: fortress_integration
        run: |
          node --import ./test/integrations/preloadTestDatabaseUrl.mjs --test test/integrations/transactionFortressConcurrency.integration.test.js
      - name: Job summary
        if: always()
        run: |
          if [ "${{ steps.fortress_integration.outcome }}" = "success" ]; then
            echo "## Nightly fortress (mock): PASS" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Nightly fortress (mock): FAIL — inspect logs" >> "$GITHUB_STEP_SUMMARY"
          fi
